# render.yaml — Infrastructure as Code para Render.
#
# Con este archivo commiteado en el repo, Render puede crear/actualizar
# servicios automáticamente (Blueprint). Ver: https://render.com/docs/blueprint-spec
#
# Flujo:
#   1. Push a GitHub.
#   2. En Render → New → Blueprint → seleccionar este repo.
#   3. Render lee este YAML y provisiona lo declarado acá.
#
# Cuando sumemos Postgres y el worker, agregamos entradas aquí.

services:
  # ---------------------------------------------------------------
  # Backend web FastAPI
  # ---------------------------------------------------------------
  - type: web
    name: primi-motors-backend
    runtime: python
    plan: starter                    # ya pagado — sin cold starts
    region: oregon                   # cualquier región sirve mientras sea consistente
    branch: main
    autoDeploy: true                 # cada push a main redeploya
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Mercado Libre — las cargamos a mano en el dashboard de Render
      # (no las declaramos con value:, para que Render las pida como secret).
      - key: ML_CLIENT_ID
        sync: false
      - key: ML_CLIENT_SECRET
        sync: false
      - key: ML_REFRESH_TOKEN
        sync: false
      # Admin del panel (también secret, se define en Render)
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      # Sesión firmada (si no está, se genera efímera en cada reinicio)
      - key: SESSION_SECRET
        sync: false
      # Conexión a la DB — Render la inyecta automáticamente desde el bloque
      # `databases:` de abajo. Nosotros no la tocamos a mano.
      - key: DATABASE_URL
        fromDatabase:
          name: primi-motors-db
          property: connectionString

# ---------------------------------------------------------------
# Postgres
# ---------------------------------------------------------------
databases:
  - name: primi-motors-db
    plan: starter                    # 1 GB, backups diarios, sin expiración
    databaseName: primi_motors       # nombre de la DB dentro del cluster
    user: primi                      # usuario master
    region: oregon                   # misma región que el web service (latencia mínima)
    postgresMajorVersion: "16"
