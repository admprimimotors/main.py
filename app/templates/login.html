<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Primi Motors — Ingresar</title>
  <style>
    :root {
      --bg: #0b0b0b;
      --panel: #141414;
      --border: #222;
      --text: #f2f2f2;
      --muted: #888;
      --brand: #a01916;
      --brand-dim: #c41e1a;
      --danger: #ff5a5a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: -apple-system, system-ui, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(ellipse at top, #1a1a1a 0%, var(--bg) 60%);
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 44px;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px;
    }
    .brand .logo {
      width: 40px; height: 40px; border-radius: 8px;
      background: var(--brand);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: #fff; font-size: 17px;
      box-shadow: 0 4px 14px rgba(160,25,22,.35);
    }
    .brand h1 {
      margin: 0; font-size: 20px; letter-spacing: 0.3px;
    }
    .brand small { color: var(--muted); display: block; font-weight: 400; font-size: 12px; }
    label {
      display: block; font-size: 13px; color: var(--muted);
      margin: 14px 0 6px;
    }
    input[type=text], input[type=password] {
      width: 100%; padding: 12px 14px;
      background: #0d0d0d; color: var(--text);
      border: 1px solid #2a2a2a; border-radius: 8px;
      font-size: 15px; outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--brand); }
    button {
      width: 100%; margin-top: 24px;
      padding: 13px; border: none; border-radius: 8px;
      background: var(--brand); color: #fff;
      font-size: 15px; font-weight: 700; letter-spacing: 0.3px;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: var(--brand-dim); }
    .error {
      margin-top: 18px; padding: 10px 14px;
      background: rgba(255,90,90,.12);
      border: 1px solid rgba(255,90,90,.35);
      border-radius: 8px;
      color: var(--danger); font-size: 13px;
    }
    .foot {
      margin-top: 24px; font-size: 12px; color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <div class="brand">
      <div class="logo">PM</div>
      <div>
        <h1>Primi Motors</h1>
        <small>Panel de administración</small>
      </div>
    </div>

    <label for="user">Usuario</label>
    <input id="user" name="user" type="text" autocomplete="username" required autofocus />

    <label for="password">Contraseña</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required />

    <button type="submit">Ingresar</button>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <div class="foot">admin.primimotors.com.ar</div>
  </form>
</body>
</html>
